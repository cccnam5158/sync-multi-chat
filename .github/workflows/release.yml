name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate tag matches package.json version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "Tag version:     $TAG_VERSION"
          echo "Package version: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and Publish (Windows installer)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run publish

      - name: Extract release notes from RELEASE_NOTES.md
        id: release_notes
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(awk "/^## v${TAG_VERSION//./\\.} /{found=1; next} /^## v[0-9]/{if(found) exit} /^---$/{if(found) exit} found" RELEASE_NOTES.md)
          echo "$NOTES" > /tmp/release_body.md
          echo "Release notes extracted for v${TAG_VERSION}:"
          cat /tmp/release_body.md

      - name: Update release notes on GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release edit "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME - $(head -1 /tmp/release_body.md | sed 's/^### //' | sed 's/^[^ ]* //')" \
            --notes-file /tmp/release_body.md \
            || echo "::warning::Could not update release notes (release may not exist yet)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            dist/*.exe
            dist/*.yml
          if-no-files-found: error

      - name: Verify artifact integrity
        shell: bash
        run: |
          echo "=== Built artifacts ==="
          ls -la dist/*.exe dist/*.yml dist/*.blockmap 2>/dev/null
          echo ""
          echo "=== latest.yml content ==="
          cat dist/latest.yml
          echo ""
          echo "=== SHA512 of installer ==="
          sha512sum dist/*.exe | head -1

  build-mac:
    needs: build-windows
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate tag matches package.json version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build macOS release artifacts (Intel + Apple Silicon)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run build:mac

      - name: Upload macOS release artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG_VER="${GITHUB_REF_NAME#v}"
          REQUIRED=(
            "dist/latest-mac.yml"
            "dist/Sync-Multi-Chat-Setup-${TAG_VER}-x64.zip"
            "dist/Sync-Multi-Chat-Setup-${TAG_VER}-arm64.zip"
            "dist/Sync-Multi-Chat-Setup-${TAG_VER}-x64.dmg"
            "dist/Sync-Multi-Chat-Setup-${TAG_VER}-arm64.dmg"
          )
          for f in "${REQUIRED[@]}"; do
            [[ -f "$f" ]] || { echo "::error::Missing $f"; ls -la dist/; exit 1; }
          done
          gh release upload "$GITHUB_REF_NAME" \
            dist/latest-mac*.yml \
            dist/Sync-Multi-Chat-Setup-${TAG_VER}-x64.zip \
            dist/Sync-Multi-Chat-Setup-${TAG_VER}-arm64.zip \
            dist/Sync-Multi-Chat-Setup-${TAG_VER}-x64.zip.blockmap \
            dist/Sync-Multi-Chat-Setup-${TAG_VER}-arm64.zip.blockmap \
            dist/Sync-Multi-Chat-Setup-${TAG_VER}-x64.dmg \
            dist/Sync-Multi-Chat-Setup-${TAG_VER}-arm64.dmg \
            --clobber

      - name: Upload mac artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-release-artifacts
          path: |
            dist/latest-mac*.yml
            dist/Sync-Multi-Chat-Setup-*.zip
            dist/Sync-Multi-Chat-Setup-*.zip.blockmap
            dist/*.dmg
          if-no-files-found: error
